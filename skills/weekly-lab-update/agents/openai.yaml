display_name: Weekly Lab Update
short_description: Summarize pipeline changes into a lab-facing weekly update.
default_prompt: >-
  Read the project's pipeline memory, identify whether the week was
  literature-heavy, experiment-heavy, idea-shift, writing-heavy, review-focused,
  mixed, or blocked, then produce a concise Chinese weekly report, meeting
  outline, or English brief with confirmed takeaways, tentative hypotheses,
  blockers, and next-week deliverables.
