display_name: Research Gap Finder
short_description: Guide literature-grounded idea selection with user checkpoints.
default_prompt: >-
  Read the project's paper_bank, paper_notes, and literature memory, summarize
  the research landscape, propose 2-4 evidence-grounded candidate directions,
  flag missing evidence and paper-finder follow-up queries, then stop for user
  selection before writing a selected research direction.
